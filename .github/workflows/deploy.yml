name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-scrubber-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: deploy to scrubber.goku.codes
    runs-on: [self-hosted, panel-prod]
    timeout-minutes: 5
    defaults:
      run:
        shell: /bin/bash -leo pipefail {0}
    env:
      NVM_DIR: /home/ubuntu/.nvm
    steps:
      - name: pull latest
        run: |
          source "$NVM_DIR/nvm.sh"
          nvm use 22 >/dev/null
          cd "$HOME/scrubber-proxy"
          git fetch --prune origin
          git checkout main
          git reset --hard origin/main
          git log -1 --oneline

      - name: install dependencies
        run: |
          source "$NVM_DIR/nvm.sh"
          nvm use 22 >/dev/null
          node -v
          cd "$HOME/scrubber-proxy"
          npm ci --omit=dev

      - name: restart service
        run: |
          systemctl --user restart scrubber
          sleep 2
          systemctl --user status scrubber --no-pager
          curl -sf https://scrubber.goku.codes/health | grep '"ok":true'

      - name: smoke
        run: |
          curl -sfI https://scrubber.goku.codes/ | grep '200 OK'
          curl -sf -X POST https://scrubber.goku.codes/scrub?rules=base \
            -H 'content-type: application/json' \
            -d '{"text":"test@example.com"}' | grep EMAIL
